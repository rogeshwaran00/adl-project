name: loan_tracking_app
description: Government of India Loan Tracking System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  geolocator: ^11.0.0
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^7.0.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
